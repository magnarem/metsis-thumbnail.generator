[tox]
envlist = py39, py310, py311, py312, py314, lint, typecheck, security
skip_missing_interpreters = true

[testenv]
package = editable
extras = dev,colored
commands =
    pytest {posargs:tests} -q

[testenv:lint]
package = skip
deps =
    ruff
commands =
    ruff check src tests

[testenv:format]
package = skip
deps =
    ruff
commands =
    ruff format src tests

[testenv:typecheck]
package = editable
extras = dev
deps =
    mypy
    types-PyYAML
    types-python-dateutil
setenv =
    PYTHONPATH = {toxinidir}/src
commands =
    mypy src

[testenv:security]
package = skip
deps =
    bandit[toml]
commands =
    bandit -r src -lll
