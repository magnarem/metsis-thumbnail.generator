name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    name: Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev,colored]

      - name: Smoke test CLI entry point
        run: |
          thumbnail-generator --help

      - name: Run pytest
        run: |
          pytest -q

  quality:
    name: Quality checks (tox)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tox
        run: |
          python -m pip install --upgrade pip
          pip install tox

      - name: Lint and format check
        run: |
          tox -e lint

      - name: Type check
        run: |
          tox -e typecheck

      - name: Security check
        run: |
          tox -e security
